<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">
  <defs>
    <!-- Window shadow -->
    <filter id="window-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
    <!-- Cursor blink animation -->
    <style>
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1.1s step-end infinite; }
      .terminal-text {
        font-family: "SF Mono", "Menlo", "Monaco", "Courier New", monospace;
        font-size: 13px;
      }
    </style>
    <!-- Title bar gradient -->
    <linearGradient id="titlebar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3C3C3C"/>
      <stop offset="100%" stop-color="#2D2D2D"/>
    </linearGradient>
    <!-- Window body -->
    <clipPath id="window-clip">
      <rect x="0" y="0" width="700" height="300" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <!-- Outer window group with shadow -->
  <g filter="url(#window-shadow)" transform="translate(0, 0)">
    <!-- Window background -->
    <rect x="0" y="0" width="700" height="300" rx="10" ry="10" fill="#1E1E1E"/>
  </g>

  <!-- Clip everything to rounded window shape -->
  <g clip-path="url(#window-clip)">
    <!-- Terminal body background -->
    <rect x="0" y="0" width="700" height="300" fill="#1E1E1E"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="700" height="38" fill="url(#titlebar-grad)"/>

    <!-- Title bar bottom border -->
    <line x1="0" y1="38" x2="700" y2="38" stroke="#111111" stroke-width="1"/>

    <!-- Traffic light buttons -->
    <!-- Close (red) -->
    <circle cx="20" cy="19" r="6.5" fill="#FF5F57" stroke="#E0443E" stroke-width="0.5"/>
    <!-- X on close on hover (static decoration) -->

    <!-- Minimize (yellow) -->
    <circle cx="40" cy="19" r="6.5" fill="#FEBC2E" stroke="#D4A017" stroke-width="0.5"/>

    <!-- Maximize (green) -->
    <circle cx="60" cy="19" r="6.5" fill="#28C840" stroke="#1DAD2B" stroke-width="0.5"/>

    <!-- Title bar text: "Terminal" centered -->
    <text x="350" y="24" text-anchor="middle" dominant-baseline="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
      font-size="13" font-weight="500" fill="#C8C8C8" letter-spacing="0.2">
      Terminal — zsh — 80×24
    </text>

    <!-- Terminal content area -->
    <!-- Line 1: prompt with typed command -->
    <text class="terminal-text" x="20" y="72" fill="#E8E8E8">
      <tspan fill="#4FC3F7">macbook</tspan><tspan fill="#E8E8E8"> </tspan><tspan fill="#A8D8A8">~</tspan><tspan fill="#E8E8E8"> % </tspan><tspan fill="#FFFFFF">xcode-select --install</tspan>
    </text>

    <!-- Line 2: system output response -->
    <text class="terminal-text" x="20" y="95" fill="#B0B0B0">
      xcode-select: note: install requested for command line developer tools
    </text>

    <!-- Line 3: blank line then new prompt -->
    <text class="terminal-text" x="20" y="128" fill="#E8E8E8">
      <tspan fill="#4FC3F7">macbook</tspan><tspan fill="#E8E8E8"> </tspan><tspan fill="#A8D8A8">~</tspan><tspan fill="#E8E8E8"> % </tspan>
    </text>

    <!-- Blinking block cursor after prompt -->
    <rect class="cursor" x="86" y="115" width="8" height="15" fill="#FFFFFF" rx="1"/>
  </g>

  <!-- Window border overlay (subtle) -->
  <rect x="0.5" y="0.5" width="699" height="299" rx="9.5" ry="9.5"
    fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
</svg>
